<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - 안전NOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        },
                        sidebar: '#1e293b',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex items-center justify-center p-4" data-spec-modal="push">
    <div class="w-full max-w-md">
        <!-- 로고 영역 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-sidebar rounded-xl mb-4">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">안전NOW</h1>
            <p class="text-sm text-gray-500 mt-1">중대재해처벌법 통합관리 솔루션</p>
        </div>

        <!-- 로그인 카드 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">로그인</h2>
            </div>
            <div class="card-body">
                <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
                    <div>
                        <label class="form-label" for="emailInput">이메일</label>
                        <input id="emailInput" type="email" class="input w-full" placeholder="example@safenow.kr"
                               value="ceo@daon.kr" required />
                    </div>
                    <div>
                        <label class="form-label" for="pwInput">비밀번호</label>
                        <input id="pwInput" type="password" class="input w-full" placeholder="••••••••"
                               value="demo1234" required />
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500" />
                            로그인 상태 유지
                        </label>
                        <a href="#" class="text-primary-600 hover:text-primary-700 font-medium" onclick="alert('비밀번호 찾기는 준비 중입니다.')">비밀번호 찾기</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-full justify-center">
                        로그인
                    </button>
                </form>

                <div class="mt-6 pt-6 border-t border-gray-100 text-center text-sm text-gray-500">
                    안전NOW가 처음이신가요?
                    <a href="register.html" class="text-primary-600 hover:text-primary-700 font-medium ml-1">회원가입</a>
                </div>
            </div>
        </div>

        <!-- 푸터 -->
        <div class="mt-6 text-center text-xs text-gray-400">
            <p>© 2026 안전NOW · 프로토타입 v1.0</p>
            <p class="mt-1">로그인 시 사업장 선택 화면(LOGIN-S)으로 이동합니다.</p>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            if (!email) return;

            // 프로토타입: 실제 인증 없이 세션 정보만 저장 후 사업장 선택 화면으로 이동
            localStorage.setItem('safenow_session_user_email', email);
            localStorage.setItem('safenow_session_user_name', '박안전');
            localStorage.setItem('safenow_logged_in', '1');

            // 브라우저 히스토리 클리어 (replace) — 뒤로가기로 로그인 화면 우회 방지
            window.location.replace('site-select.html');
        }
    </script>
    <script src="design/screen-spec-modal.js"></script>
</body>
</html>
